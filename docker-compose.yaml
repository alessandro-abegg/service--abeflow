version: '3.8'

services:
  mongodb:
    image: mongo:7-jammy
    container_name: abeflow_mongodb
    environment:
      MONGO_INITDB_DATABASE: abeflow
      MONGO_INITDB_ROOT_USERNAME: abeflow_user
      MONGO_INITDB_ROOT_PASSWORD: abeflow_pass
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - abeflow_network

  redis:
    image: redis:7-alpine
    container_name: abeflow_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - abeflow_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: abeflow_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: abeflow_user
      RABBITMQ_DEFAULT_PASS: abeflow_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - abeflow_network

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:

networks:
  abeflow_network:
    driver: bridge
