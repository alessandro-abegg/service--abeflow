spring:
  application:
    name: abeflow-service
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      host: localhost
      port: 27017
      database: abeflow
      authentication-database: admin
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: abeflow_user
    password: abeflow_pass
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/abeflow

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    br.com.abegg.abeflow: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, info, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

abeflow:
  api:
    version: v1
    base-path: /api/v1

logbook:
  include:
    - /api/**
  exclude:
    - /actuator/**
  obfuscate:
    headers:
      - Authorization
      - X-API-Key
      - X-Auth-Token
    parameters:
      - password
      - secret
      - token
      - access_token
      - refresh_token
    body:
      - password
      - secret
      - token
      - accessToken
      - refreshToken
