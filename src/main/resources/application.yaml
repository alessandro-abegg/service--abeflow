spring:
  application:
    name: abeflow-service
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
  datasource:
    url: jdbc:mysql://localhost:3306/abeflow?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: abeflow_user
    password: abeflow_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  rabbitmq:
    host: localhost
    port: 5672
    username: abeflow_user
    password: abeflow_pass

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    br.com.abegg.abeflow: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, info, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

abeflow:
  api:
    version: v1
    base-path: /api/v1
